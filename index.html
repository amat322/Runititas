<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Runititas Pro - AI Animated v5.5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Library Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; overflow-x: hidden; }
    .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); }
    .progress-transition { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    
    /* Animations */
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
    
    .animate-page { animation: fadeIn 0.4s ease-out forwards; }
    .animate-list-item { opacity: 0; animation: slideInUp 0.4s ease-out forwards; }
    .animate-toast { animation: slideInDown 0.3s ease-out forwards; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    input:focus, select:focus, textarea:focus { outline: none; }
    
    .active-tab-shadow { box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4); }
    
    .shimmer { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmerAnim 1.5s infinite; }
    @keyframes shimmerAnim { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Gemini API Configuration ---
    const apiKey = ""; 

    // --- Firebase Initialization ---
    const myFirebaseConfig = {
      apiKey: "PASTE_API_KEY_KAMU",
      authDomain: "PROJECT_ID.firebaseapp.com",
      projectId: "PROJECT_ID",
      storageBucket: "PROJECT_ID.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    let auth, db;
    try {
      if (!firebase.apps.length && myFirebaseConfig.apiKey !== "PASTE_API_KEY_KAMU") {
        firebase.initializeApp(myFirebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      }
    } catch (e) { console.error("Firebase Error:", e); }

    const appId = "runititas-ai-v5-5";
    const CATEGORIES = ['Ibadah', 'Kesehatan', 'Konten', 'Santai', 'Belajar', 'Produktivitas', 'Kerja'];
    const COLORS = ['bg-indigo-600', 'bg-emerald-500', 'bg-blue-600', 'bg-teal-500', 'bg-rose-500', 'bg-amber-500', 'bg-violet-500', 'bg-slate-700'];

    const Icons = {
      Home: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Agenda: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Review: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,
      Excel: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
      Plus: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Magic: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/></svg>,
      Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    };

    const callGemini = async (prompt, systemInstruction = "") => {
      let retryCount = 0;
      const maxRetries = 5;
      while (retryCount < maxRetries) {
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              systemInstruction: { parts: [{ text: systemInstruction }] }
            })
          });
          const result = await response.json();
          return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
        } catch (error) {
          retryCount++;
          await new Promise(res => setTimeout(res, Math.pow(2, retryCount) * 1000));
        }
      }
    };

    function App() {
      const [user, setUser] = useState(null);
      const [habits, setHabits] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingHabit, setEditingHabit] = useState(null);
      const [formData, setFormData] = useState({ title: '', time: '', category: 'Produktivitas', color: 'bg-indigo-600', subtasks: [] });
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [aiFeedback, setAiFeedback] = useState("");
      const [pasteData, setPasteData] = useState('');
      const [selectedDeleteIds, setSelectedDeleteIds] = useState([]);
      
      // Toast State
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3000);
      };

      useEffect(() => {
        if (!auth) { setUser({ uid: "demo-user" }); setIsLoading(false); return; }
        return auth.onAuthStateChanged(u => {
          if (u) setUser(u);
          else auth.signInAnonymously();
        });
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const habitDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('master_plan');
        return habitDoc.onSnapshot((snap) => {
          setHabits(snap.exists ? snap.data().habits || [] : []);
          setIsLoading(false);
        });
      }, [user]);

      const saveToCloud = async (newData) => {
        if (!user || !db) return;
        try {
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('master_plan').set({ habits: newData });
        } catch (err) { console.error(err); }
      };

      const toggleSub = (hId, sId) => {
        const newData = habits.map(h => h.id === hId ? {
          ...h, subtasks: h.subtasks.map(s => s.id === sId ? { ...s, isDone: !s.isDone } : s)
        } : h);
        setHabits(newData);
        saveToCloud(newData);
      };

      const handleSave = (e) => {
        e.preventDefault();
        const validSubs = formData.subtasks.filter(s => s.title.trim() !== '');
        const finalHabit = { ...formData, subtasks: validSubs, id: editingHabit ? editingHabit.id : 'h-' + Date.now() };
        const newData = editingHabit ? habits.map(h => h.id === editingHabit.id ? finalHabit : h) : [...habits, finalHabit];
        setHabits(newData);
        saveToCloud(newData);
        setIsModalOpen(false);
        showToast(editingHabit ? 'Agenda diperbarui!' : 'Agenda baru ditambahkan!', 'success');
      };

      const generateAiSubtasks = async () => {
        if (!formData.title) return;
        setIsAiLoading(true);
        try {
          const prompt = `Pecahkan "${formData.title}" menjadi 3 sub-tugas praktis. JSON array string: ["Sub 1", "Sub 2", "Sub 3"]`;
          const resultText = await callGemini(prompt, "Hanya balas dengan JSON array.");
          const subTitles = JSON.parse(resultText.replace(/```json|```/g, "").trim());
          const newSubs = subTitles.map(title => ({ id: Date.now() + Math.random(), title, isDone: false }));
          setFormData(prev => ({ ...prev, subtasks: [...prev.subtasks, ...newSubs] }));
          showToast('Breakdown AI berhasil!', 'success');
        } catch (e) { showToast('AI Gagal merespon', 'error'); } finally { setIsAiLoading(false); }
      };

      const handleRestore = () => {
        try {
          const parsed = JSON.parse(pasteData);
          if(Array.isArray(parsed)) {
            setHabits(parsed);
            saveToCloud(parsed);
            setPasteData('');
            showToast('Data berhasil dipulihkan! ✅', 'success');
            setActiveTab('dashboard');
          } else { showToast('Format data salah!', 'error'); }
        } catch(e) { showToast('Gagal restore data!', 'error'); }
      };

      const deleteSelectedHabits = () => {
        if (selectedDeleteIds.length === 0) return;
        if (confirm(`Hapus ${selectedDeleteIds.length} agenda terpilih?`)) {
          const newData = habits.filter(h => !selectedDeleteIds.includes(h.id));
          setHabits(newData);
          saveToCloud(newData);
          setSelectedDeleteIds([]);
          showToast('Agenda dihapus!', 'success');
        }
      };

      const totalProgress = useMemo(() => {
        if (habits.length === 0) return 0;
        const total = habits.reduce((acc, h) => acc + h.subtasks.length, 0);
        const done = habits.reduce((acc, h) => acc + h.subtasks.filter(s => s.isDone).length, 0);
        return total === 0 ? 0 : Math.round((done / total) * 100);
      }, [habits]);

      if (isLoading) return (
        <div className="h-screen flex items-center justify-center bg-indigo-600 text-white font-black animate-pulse overflow-hidden">
          <div className="text-center">
            <div className="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mx-auto mb-4"></div>
            <p className="tracking-widest uppercase text-xs">Runititas Pro...</p>
          </div>
        </div>
      );

      return (
        <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-24 relative overflow-hidden">
          
          {/* TOAST NOTIFICATION */}
          {toast.show && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-64 animate-toast">
              <div className={`px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border ${toast.type === 'success' ? 'bg-emerald-600 border-emerald-500' : 'bg-indigo-600 border-indigo-500'} text-white`}>
                <div className="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center">
                  <Icons.Check />
                </div>
                <p className="text-xs font-black uppercase tracking-tight">{toast.message}</p>
              </div>
            </div>
          )}

          {/* HEADER COMPACT */}
          <header className="p-4 pt-6">
            <div className="flex justify-between items-center mb-4">
              <h1 className="text-xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none">RUNITITAS <span className="text-slate-400 not-italic font-medium text-[9px]">v5.5</span></h1>
              <div className="flex gap-2">
                {isAiLoading && <div className="w-5 h-5 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>}
                <div className="w-7 h-7 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-black text-[9px] uppercase">{user?.uid.slice(0,1)}</div>
              </div>
            </div>
            
            <div className="bg-slate-900 rounded-[28px] p-5 text-white shadow-lg relative overflow-hidden transition-all duration-500">
               <div className="relative z-10 flex justify-between items-center">
                <div>
                  <p className="text-[9px] font-black uppercase opacity-40 mb-0.5 tracking-widest">Capaian</p>
                  <h2 className="text-3xl font-black">{totalProgress}%</h2>
                </div>
                <div className="w-2/3 text-right">
                  <div className="w-full bg-white/10 h-2 rounded-full overflow-hidden mb-1">
                    <div className="bg-indigo-500 h-full progress-transition" style={{ width: `${totalProgress}%` }}></div>
                  </div>
                  <p className="text-[8px] font-bold opacity-40 uppercase">Besok Lebih Gas!</p>
                </div>
              </div>
              <div className="absolute -right-6 -bottom-6 w-20 h-20 bg-indigo-600/20 rounded-full blur-2xl"></div>
            </div>
          </header>

          <main className="px-4">
            {/* 1. DASHBOARD */}
            {activeTab === 'dashboard' && (
              <div key="dash" className="animate-page space-y-4">
                {habits.length === 0 ? (
                   <div className="py-16 text-center text-slate-300 font-bold italic text-xs animate-up">Belum ada agenda.</div>
                ) : (
                  habits.map((habit, idx) => (
                    <div key={habit.id} className="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 animate-list-item" style={{ animationDelay: `${idx * 0.08}s` }}>
                      <div className="flex items-center gap-3 mb-3">
                        <div className={`w-1 h-8 rounded-full ${habit.color}`}></div>
                        <div className="flex-1">
                          <h4 className="font-black text-slate-800 text-sm leading-tight">{habit.title}</h4>
                          <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{habit.time}</p>
                        </div>
                      </div>
                      <div className="grid grid-cols-1 gap-1.5">
                        {habit.subtasks.map(sub => (
                          <label key={sub.id} className={`flex items-center gap-3 p-3 rounded-xl transition-all cursor-pointer group active:scale-95 ${sub.isDone ? 'bg-slate-50 opacity-40' : 'bg-white border border-slate-50 shadow-sm'}`}>
                            <input type="checkbox" checked={sub.isDone} onChange={() => toggleSub(habit.id, sub.id)} className="w-4 h-4 rounded-md border-slate-300 text-indigo-600 focus:ring-0 transition-transform group-active:scale-125" />
                            <span className={`text-[11px] font-bold ${sub.isDone ? 'line-through text-slate-400' : 'text-slate-700'}`}>{sub.title}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {/* 2. AGENDA */}
            {activeTab === 'agenda' && (
              <div key="agenda" className="animate-page space-y-3">
                <div className="flex justify-between items-center mb-3">
                  <h2 className="text-lg font-black italic uppercase">Agenda</h2>
                  <button onClick={() => { setEditingHabit(null); setFormData({title:'',time:'08:00',category:'Konten',color:'bg-indigo-600',subtasks:[]}); setIsModalOpen(true); }} className="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center shadow-md active:scale-90 transition-transform">
                    <Icons.Plus />
                  </button>
                </div>
                {habits.map((h, idx) => (
                  <div key={h.id} onClick={() => {setEditingHabit(h); setFormData({...h}); setIsModalOpen(true);}} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-all animate-list-item" style={{ animationDelay: `${idx * 0.05}s` }}>
                    <div className="flex items-center gap-3">
                      <div className={`w-9 h-9 rounded-xl ${h.color} flex items-center justify-center text-white font-black text-[9px]`}>{h.time.split(':')[0]}</div>
                      <div>
                        <h4 className="font-black text-slate-800 text-xs leading-none mb-1">{h.title}</h4>
                        <p className="text-[8px] font-bold text-indigo-500 uppercase">{h.category}</p>
                      </div>
                    </div>
                    <div className="text-slate-200"><Icons.Agenda /></div>
                  </div>
                ))}
              </div>
            )}

            {/* 3. REVIEW */}
            {activeTab === 'review' && (
              <div key="review" className="animate-page space-y-6">
                 <div className="flex flex-col items-center pt-4">
                    <div className="w-36 h-36 rounded-full bg-white shadow-xl flex items-center justify-center relative mb-4 animate-in">
                        <svg className="absolute inset-0 w-full h-full -rotate-90">
                          <circle cx="72" cy="72" r="64" fill="none" stroke="#f1f5f9" strokeWidth="6" />
                          <circle cx="72" cy="72" r="64" fill="none" stroke="#4f46e5" strokeWidth="6" strokeDasharray="402" strokeDashoffset={402 - (402 * totalProgress / 100)} className="progress-transition" />
                        </svg>
                        <span className="text-3xl font-black text-slate-800">{totalProgress}%</span>
                    </div>
                    <div className="w-full bg-indigo-600 rounded-[24px] p-4 text-white relative overflow-hidden shadow-lg animate-up">
                        <p className="text-[8px] font-black uppercase text-indigo-300 mb-1 tracking-widest flex items-center gap-2">✨ Motivasi Gemini</p>
                        {isAiLoading ? <div className="h-4 shimmer rounded w-full"></div> : <p className="text-[11px] font-bold leading-relaxed italic">"{aiFeedback || "Ayo selesaikan harimu!"}"</p>}
                    </div>
                 </div>

                 {/* Pembersih Agenda */}
                 <div className="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 animate-up">
                    <div className="flex justify-between items-center mb-3">
                        <h3 className="text-xs font-black uppercase text-slate-400 tracking-wider">Kelola Agenda</h3>
                        {selectedDeleteIds.length > 0 && (
                          <button onClick={deleteSelectedHabits} className="text-[10px] font-black text-rose-500 bg-rose-50 px-3 py-1 rounded-lg flex items-center gap-1 animate-toast">
                            <Icons.Trash /> Hapus ({selectedDeleteIds.length})
                          </button>
                        )}
                    </div>
                    <div className="space-y-2 max-h-60 overflow-y-auto hide-scrollbar">
                        {habits.length === 0 ? <p className="text-[10px] text-center text-slate-300 py-4">Agenda kosong.</p> : habits.map(h => (
                          <div key={h.id} onClick={() => setSelectedDeleteIds(prev => prev.includes(h.id) ? prev.filter(i => i !== h.id) : [...prev, h.id])} className={`p-3 rounded-xl border flex items-center gap-3 cursor-pointer transition-all ${selectedDeleteIds.includes(h.id) ? 'bg-rose-50 border-rose-100' : 'bg-slate-50 border-transparent'}`}>
                              <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors ${selectedDeleteIds.includes(h.id) ? 'bg-rose-500 border-rose-500' : 'border-slate-200'}`}>
                                  {selectedDeleteIds.includes(h.id) && <Icons.Check />}
                              </div>
                              <div className="flex-1">
                                <p className="text-[11px] font-bold text-slate-700">{h.title}</p>
                                <p className="text-[8px] text-slate-400 font-bold uppercase">{h.time} • {h.category}</p>
                              </div>
                          </div>
                        ))}
                    </div>
                 </div>
              </div>
            )}

            {/* 4. DATA/EXCEL */}
            {activeTab === 'excel' && (
              <div key="data" className="animate-page space-y-4 pb-10">
                 <div className="bg-slate-900 p-6 rounded-[28px] text-white shadow-lg animate-up">
                    <h3 className="font-black italic mb-3 uppercase text-[11px] text-indigo-400 tracking-widest">Backup & Restore</h3>
                    <button onClick={() => { navigator.clipboard.writeText(JSON.stringify(habits)); showToast('Data disalin ke clipboard! ✅'); }} className="w-full bg-white text-slate-900 py-3 rounded-xl font-black uppercase text-[10px] mb-3 active:scale-95 transition-transform">Salin Data Agenda</button>
                    <textarea value={pasteData} onChange={e=>setPasteData(e.target.value)} className="w-full h-16 bg-white/5 p-3 text-[9px] font-mono text-white rounded-xl mb-3 border border-white/10" placeholder="Tempel data di sini..."></textarea>
                    <button onClick={handleRestore} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-black uppercase text-[10px] active:scale-95 transition-transform">Restore Data 🔄</button>
                 </div>
                 
                 <div className="text-center pt-4 animate-up" style={{animationDelay: '0.2s'}}>
                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 leading-none">By Gemini AI Power Developer</p>
                    <img src="https://i.supaimg.com/ad460eb2-b309-4aa9-b61c-59eea64d0f56/84282f7b-0886-40a8-b4cc-752e51042834.png" alt="Gemini AI" className="w-24 mx-auto rounded-xl shadow border border-white opacity-60 hover:opacity-100 transition-all duration-500" onError={e=>e.target.style.display='none'} />
                 </div>
                 
                 <button onClick={() => { if(confirm("Hapus semua?")) { setHabits([]); saveToCloud([]); showToast('Aplikasi direset!', 'error'); } }} className="w-full text-[8px] font-black text-rose-500/40 uppercase pt-4">Reset Aplikasi</button>
              </div>
            )}
          </main>

          {/* MODAL EDITOR */}
          {isModalOpen && (
            <div className="fixed inset-0 z-[70] bg-slate-900/60 backdrop-blur-md flex items-end justify-center p-0">
              <div className="bg-white w-full max-w-md rounded-t-[32px] p-6 shadow-2xl animate-page max-h-[85vh] overflow-y-auto hide-scrollbar">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-black text-slate-800 uppercase italic">{editingHabit ? 'Ubah' : 'Baru'}</h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-slate-300 text-xl font-bold">✕</button>
                </div>
                <form onSubmit={handleSave} className="space-y-4">
                  <div className="flex gap-2">
                    <input required value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="flex-1 bg-slate-50 p-4 rounded-xl font-bold text-xs border border-slate-100" placeholder="Judul..." />
                    <button type="button" onClick={generateAiSubtasks} className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${formData.title ? 'bg-indigo-600 text-white active:rotate-12' : 'bg-slate-100 text-slate-300'}`}>
                      {isAiLoading ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Icons.Magic />}
                    </button>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <input required value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold text-xs border border-slate-100" placeholder="Waktu..." />
                    <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl font-bold text-xs border border-slate-100">
                      {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="space-y-2">
                    <div className="flex justify-between items-center"><label className="text-[9px] font-black uppercase text-slate-400">Sub-Tugas</label><button type="button" onClick={()=>setFormData({...formData, subtasks: [...formData.subtasks, {id: Date.now(), title: '', isDone: false}]})} className="text-[9px] font-black text-indigo-600 uppercase">+ Tambah</button></div>
                    {formData.subtasks.map(s => (
                      <div key={s.id} className="flex gap-2 animate-up">
                        <input required value={s.title} onChange={e => setFormData({...formData, subtasks: formData.subtasks.map(sub => sub.id === s.id ? {...sub, title: e.target.value} : sub)})} className="flex-1 bg-slate-50 p-3 rounded-xl text-[10px] font-bold border border-slate-50" />
                        <button type="button" onClick={() => setFormData({...formData, subtasks: formData.subtasks.filter(sub => sub.id !== s.id)})} className="text-rose-500 font-bold px-2">✕</button>
                      </div>
                    ))}
                  </div>
                  <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Simpan Agenda</button>
                </form>
              </div>
            </div>
          )}

          {/* NAVIGASI BAWAH */}
          <nav className="fixed bottom-4 left-4 right-4 glass-morphism rounded-3xl p-1.5 flex justify-between items-center shadow-xl z-60 border-t-0">
            {[ 
              { id: 'dashboard', icon: <Icons.Home />, label: 'Home' },
              { id: 'agenda', icon: <Icons.Agenda />, label: 'Agenda' },
              { id: 'review', icon: <Icons.Review />, label: 'Review' },
              { id: 'excel', icon: <Icons.Excel />, label: 'Data' }
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-3 rounded-2xl flex flex-col items-center gap-1 transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white active-tab-shadow scale-105' : 'text-slate-400'}`}>
                {tab.icon}
                <span className="text-[6.5px] font-black uppercase tracking-widest leading-none mt-0.5">{tab.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
