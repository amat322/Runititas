<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Runititas Pro - Wisdom v7.2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; overflow-x: hidden; background-color: #f8fafc; color: #0f172a; }
    .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(0, 0, 0, 0.05); }
    .progress-transition { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    
    .animate-page { animation: fadeIn 0.4s ease-out forwards; }
    .animate-list-item { opacity: 0; animation: slideInUp 0.4s ease-out forwards; }
    .animate-toast { animation: slideInDown 0.3s ease-out forwards; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    input:focus, select:focus, textarea:focus { outline: none; }
    
    .active-tab-shadow { box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4); }
    
    .shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmerAnim 1.5s infinite; }
    @keyframes shimmerAnim { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .blueprint-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); position: relative; overflow: hidden; }
    .blueprint-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; opacity: 0.2; }
    
    .date-chip { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Gemini API Configuration ---
    const apiKey = ""; 

    const STORAGE_KEY_PLAN = "runititas_plan_v7";
    const STORAGE_KEY_HISTORY = "runititas_history_v7";

    const CATEGORIES = ['Ibadah', 'Kesehatan', 'Konten', 'Santai', 'Belajar', 'Produktivitas', 'Kerja'];
    const COLORS = ['bg-indigo-600', 'bg-emerald-500', 'bg-blue-600', 'bg-teal-500', 'bg-rose-500', 'bg-amber-500', 'bg-violet-500', 'bg-slate-700'];

    const Icons = {
      Home: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Agenda: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Review: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,
      Excel: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
      Plus: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Magic: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/></svg>,
      Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Brain: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.245 4 4 0 0 0 7.831 1.759A4 4 0 0 0 19 18.14a4 4 0 0 0 .52-8.245 4 4 0 0 0-2.526-5.77A3 3 0 1 0 12 5Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M15 13a4.5 4.5 0 0 1-3-4"/><path d="M12 13V9"/></svg>,
      Quote: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" className="text-indigo-400 opacity-50"><path d="M14.017 21L14.017 18C14.017 16.8954 14.9124 16 16.017 16H19.017C19.5693 16 20.017 15.5523 20.017 15V9C20.017 8.44772 19.5693 8 19.017 8H16.017C15.4647 8 15.017 8.44772 15.017 9V12C15.017 12.5523 14.5693 13 14.017 13H12.017V21H14.017ZM5.017 21L5.017 18C5.017 16.8954 5.9124 16 7.017 16H10.017C10.5693 16 11.017 15.5523 11.017 15V9C11.017 8.44772 10.5693 8 10.017 8H7.017C6.46472 8 6.017 8.44772 6.017 9V12C6.017 12.5523 5.5693 13 5.017 13H3.017V21H5.017Z"/></svg>,
      Shop: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,
      TikTok: () => <svg width="18" height="18" fill="currentColor" viewBox="0 0 448 512"><path d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.17h0A122.18,122.18,0,0,0,381,102.39a121.43,121.43,0,0,0,67,20.14Z"/></svg>,
      Shield: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    };

    // --- Helpers ---
    const getFormattedDate = (date) => {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const generateLast7Days = () => {
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push({
          full: getFormattedDate(d),
          dayName: d.toLocaleDateString('id-ID', { weekday: 'short' }),
          dateNum: d.getDate()
        });
      }
      return dates.reverse();
    };

    const callGemini = async (prompt, systemInstruction = "") => {
      let retryCount = 0;
      while (retryCount < 3) {
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              systemInstruction: { parts: [{ text: systemInstruction }] }
            })
          });
          const result = await response.json();
          return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
        } catch (error) { retryCount++; await new Promise(r => setTimeout(r, 2000)); }
      }
      return "";
    };

    function App() {
      const [habits, setHabits] = useState([]);
      const [history, setHistory] = useState({}); 
      const [selectedDate, setSelectedDate] = useState(getFormattedDate(new Date()));
      const [isLoading, setIsLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingHabit, setEditingHabit] = useState(null);
      const [formData, setFormData] = useState({ title: '', time: '', category: 'Produktivitas', color: 'bg-indigo-600', subtasks: [] });
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [pasteData, setPasteData] = useState('');
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const [habitCheckInput, setHabitCheckInput] = useState('');
      const [habitResult, setHabitResult] = useState(null);

      const daysList = useMemo(() => generateLast7Days(), []);

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3000);
      };

      useEffect(() => {
        const savedPlan = localStorage.getItem(STORAGE_KEY_PLAN);
        const savedHistory = localStorage.getItem(STORAGE_KEY_HISTORY);
        if (savedPlan) setHabits(JSON.parse(savedPlan));
        if (savedHistory) setHistory(JSON.parse(savedHistory));
        setSelectedDate(getFormattedDate(new Date()));
        setIsLoading(false);
      }, []);

      const savePlan = (newData) => {
        setHabits(newData);
        localStorage.setItem(STORAGE_KEY_PLAN, JSON.stringify(newData));
      };

      const saveHistory = (newHistory) => {
        setHistory(newHistory);
        localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(newHistory));
      };

      const toggleSub = (hId, sId) => {
        const key = `${hId}_${sId}`;
        const newDayHistory = { ...(history[selectedDate] || {}) };
        newDayHistory[key] = !newDayHistory[key];
        const updatedHistory = { ...history, [selectedDate]: newDayHistory };
        saveHistory(updatedHistory);
      };

      const handleSave = (e) => {
        e.preventDefault();
        const validSubs = formData.subtasks.filter(s => s.title.trim() !== '');
        const finalHabit = { ...formData, subtasks: validSubs, id: editingHabit ? editingHabit.id : 'h-' + Date.now() };
        const newData = editingHabit ? habits.map(h => h.id === editingHabit.id ? finalHabit : h) : [...habits, finalHabit];
        savePlan(newData);
        setIsModalOpen(false);
        showToast(editingHabit ? 'Misi diperbarui!' : 'Misi baru ditambahkan!', 'success');
      };

      const generateAiSubtasks = async () => {
        if (!formData.title) return;
        setIsAiLoading(true);
        try {
          const prompt = `Pecahkan misi: "${formData.title}" menjadi 3 sub-tugas praktis. JSON array: ["Langkah 1", "Langkah 2", "Langkah 3"]`;
          const res = await callGemini(prompt, "Hanya balas JSON array.");
          const cleanJson = res.replace(/```json|```/g, "").trim();
          const subTitles = JSON.parse(cleanJson);
          const newSubs = subTitles.map(title => ({ id: 'sub-' + Math.random(), title }));
          setFormData(prev => ({ ...prev, subtasks: [...prev.subtasks, ...newSubs] }));
          showToast('Breakdown AI Berhasil!', 'success');
        } catch (e) { showToast('AI Gagal', 'error'); } finally { setIsAiLoading(false); }
      };

      const checkHabitWithAI = async () => {
        if (!habitCheckInput) return;
        setIsAiLoading(true);
        try {
          const prompt = `Analisis kebiasaan: "${habitCheckInput}". Berikan label "GOOD" atau "BAD" dan penjelasan singkat (max 15 kata). Format JSON: {"verdict": "GOOD", "reason": "Penjelasan"}`;
          const res = await callGemini(prompt, "Pakar psikologi kebiasaan.");
          const data = JSON.parse(res.replace(/```json|```/g, "").trim());
          setHabitResult(data);
          showToast('Analisis selesai!', 'success');
        } catch (e) { showToast('Gagal menganalisis', 'error'); } finally { setIsAiLoading(false); }
      };

      const dayProgress = useMemo(() => {
        if (habits.length === 0) return 0;
        let total = 0;
        let done = 0;
        habits.forEach(h => {
          h.subtasks.forEach(s => {
            total++;
            if (history[selectedDate]?.[`${h.id}_${s.id}`]) done++;
          });
        });
        return total === 0 ? 0 : Math.round((done / total) * 100);
      }, [habits, history, selectedDate]);

      if (isLoading) return <div className="h-screen flex items-center justify-center bg-indigo-600 text-white font-black animate-pulse">RUNITITAS...</div>;

      return (
        <div className="max-w-md mx-auto min-h-screen pb-24 relative px-4">
          
          {toast.show && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-64 animate-toast">
              <div className={`px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border ${toast.type === 'success' ? 'bg-emerald-600 border-emerald-500' : 'bg-indigo-600 border-indigo-500'} text-white`}>
                <div className="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center font-bold">✓</div>
                <p className="text-[10px] font-black uppercase tracking-widest">{toast.message}</p>
              </div>
            </div>
          )}

          <header className="pt-6 mb-6">
            <div className="flex justify-between items-center mb-4 px-2">
              <div>
                <h1 className="text-xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none">RUNITITAS <span className="text-slate-400 not-italic font-medium text-[9px]">v7.2</span></h1>
                <p className="text-[7px] font-bold text-slate-400 uppercase tracking-widest mt-1 flex items-center gap-1 opacity-60">
                   <Icons.Shield /> gunakan dengan bijak
                </p>
              </div>
              <div className="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-black text-[9px]">R</div>
            </div>
            
            <div className="bg-slate-900 rounded-[28px] p-6 text-white shadow-xl relative overflow-hidden">
               <div className="relative z-10 flex justify-between items-center">
                <div>
                  <p className="text-[9px] font-black uppercase opacity-40 mb-1 tracking-widest">Progress {selectedDate === getFormattedDate(new Date()) ? 'Hari Ini' : 'Arsip'}</p>
                  <h2 className="text-4xl font-black">{dayProgress}%</h2>
                </div>
                <div className="w-2/3 text-right">
                  <div className="w-full bg-white/10 h-2.5 rounded-full overflow-hidden mb-1.5">
                    <div className="bg-indigo-500 h-full progress-transition" style={{ width: `${dayProgress}%` }}></div>
                  </div>
                  <p className="text-[8px] font-bold opacity-40 uppercase tracking-tighter italic">{selectedDate}</p>
                </div>
              </div>
              <div className="absolute -right-6 -bottom-6 w-24 h-24 bg-indigo-600/20 rounded-full blur-2xl"></div>
            </div>
          </header>

          <main>
            {activeTab === 'dashboard' && (
              <div key="dash" className="animate-page space-y-6">
                
                {/* DATE SELECTOR */}
                <div className="flex justify-between gap-2 overflow-x-auto hide-scrollbar py-2 px-1">
                  {daysList.map(d => (
                    <button 
                      key={d.full} 
                      onClick={() => setSelectedDate(d.full)}
                      className={`flex-shrink-0 w-12 py-3 rounded-2xl flex flex-col items-center gap-1 date-chip ${selectedDate === d.full ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-white text-slate-400 shadow-sm border border-slate-50'}`}
                    >
                      <span className="text-[8px] font-black uppercase">{d.dayName}</span>
                      <span className="text-sm font-black">{d.dateNum}</span>
                    </button>
                  ))}
                </div>

                <div className="space-y-4">
                  {habits.length === 0 ? <div className="py-20 text-center text-slate-300 font-bold italic text-xs animate-up">Blueprint kosong, buat misi sekarang!</div> : habits.map((habit, idx) => (
                    <div key={habit.id} className="bg-white rounded-[32px] p-5 shadow-sm border border-slate-100 animate-list-item" style={{ animationDelay: `${idx * 0.08}s` }}>
                      <div className="flex items-center gap-4 mb-4">
                        <div className={`w-1.5 h-10 rounded-full ${habit.color}`}></div>
                        <div className="flex-1">
                          <h4 className="font-black text-slate-800 text-sm leading-tight">{habit.title}</h4>
                          <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{habit.time}</p>
                        </div>
                      </div>
                      <div className="grid grid-cols-1 gap-2">
                        {habit.subtasks.map(sub => {
                          const isDone = history[selectedDate]?.[`${habit.id}_${sub.id}`];
                          return (
                            <label key={sub.id} className={`flex items-center gap-4 p-4 rounded-2xl transition-all cursor-pointer group active:scale-95 ${isDone ? 'bg-slate-50 opacity-40 border-transparent' : 'bg-white border border-slate-50 shadow-sm'}`}>
                              <input type="checkbox" checked={!!isDone} onChange={() => toggleSub(habit.id, sub.id)} className="w-5 h-5 rounded-md border-slate-300 text-indigo-600 focus:ring-0" />
                              <span className={`text-[11px] font-bold ${isDone ? 'line-through text-slate-400' : 'text-slate-700'}`}>{sub.title}</span>
                            </label>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'agenda' && (
              <div key="agenda" className="animate-page space-y-3">
                <div className="flex justify-between items-center mb-4 px-2">
                  <h2 className="text-lg font-black italic uppercase tracking-tighter">Manajemen</h2>
                  <button onClick={() => { setEditingHabit(null); setFormData({title:'',time:'08:00',category:'Konten',color:'bg-indigo-600',subtasks:[]}); setIsModalOpen(true); }} className="w-11 h-11 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform"><Icons.Plus /></button>
                </div>
                {habits.map((h, idx) => (
                  <div key={h.id} onClick={() => {setEditingHabit(h); setFormData({...h}); setIsModalOpen(true);}} className="bg-white p-4 rounded-3xl border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-all animate-list-item shadow-sm" style={{ animationDelay: `${idx * 0.05}s` }}>
                    <div className="flex items-center gap-4">
                      <div className={`w-10 h-10 rounded-2xl ${h.color} flex items-center justify-center text-white font-black text-[10px]`}>{h.time.split(':')[0]}</div>
                      <div className="flex-1">
                        <h4 className="font-black text-slate-800 text-xs leading-none mb-1.5">{h.title}</h4>
                        <p className="text-[8px] font-bold text-indigo-500 uppercase tracking-widest">{h.category}</p>
                      </div>
                    </div>
                    <div className="text-slate-200"><Icons.Agenda /></div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'review' && (
              <div key="review" className="animate-page space-y-6 pb-4">
                 <div className="flex flex-col items-center pt-4">
                    <div className="w-36 h-36 rounded-full bg-white shadow-xl flex items-center justify-center relative mb-6">
                        <svg className="absolute inset-0 w-full h-full -rotate-90">
                          <circle cx="72" cy="72" r="64" fill="none" stroke="#f1f5f9" strokeWidth="8" />
                          <circle cx="72" cy="72" r="64" fill="none" stroke="#4f46e5" strokeWidth="8" strokeDasharray="402" strokeDashoffset={402 - (402 * dayProgress / 100)} className="progress-transition" />
                        </svg>
                        <span className="text-3xl font-black text-slate-800">{dayProgress}%</span>
                    </div>
                    <div className="w-full bg-indigo-600 rounded-[24px] p-5 text-white relative overflow-hidden shadow-lg animate-up text-center">
                        <p className="text-[8px] font-black uppercase text-indigo-300 mb-1 tracking-widest italic leading-none">💡 AI Analysis</p>
                        <p className="text-[11px] font-bold leading-relaxed italic mt-2">"Jadikan setiap hari sebagai batu bata yang kokoh untuk istana masa depanmu!"</p>
                    </div>
                 </div>
              </div>
            )}

            {activeTab === 'excel' && (
              <div key="data" className="animate-page space-y-6 pb-12">
                 <div className="bg-slate-900 p-7 rounded-[32px] text-white shadow-xl animate-up text-center">
                    <h3 className="font-black italic mb-4 uppercase text-[11px] text-indigo-400 tracking-widest text-center">Export / Import</h3>
                    <button onClick={() => { navigator.clipboard.writeText(JSON.stringify({h: habits, s: history})); showToast('Full Data Tersalin! ✅'); }} className="w-full bg-white text-slate-900 py-3.5 rounded-2xl font-black uppercase text-[10px] mb-3 active:scale-95 transition-transform shadow-md">Salin Database</button>
                    <textarea value={pasteData} onChange={e=>setPasteData(e.target.value)} className="w-full h-16 bg-white/5 p-4 text-[9px] font-mono text-white rounded-2xl mb-4 border border-white/10" placeholder="Paste system code here..."></textarea>
                    <button onClick={() => { try{const p=JSON.parse(pasteData); if(p.h && p.s){savePlan(p.h); saveHistory(p.s); setPasteData(''); showToast('Restore Berhasil! ✅', 'success'); setActiveTab('dashboard');}}catch(e){showToast('Error Code!', 'error');} }} className="w-full bg-indigo-600 text-white py-3.5 rounded-2xl font-black uppercase text-[10px] active:scale-95 transition-all shadow-lg">Restore System 🔄</button>
                 </div>

                 <div className="text-center pt-2 animate-up">
                    <p className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6 leading-none">Powered By Gemini AI</p>
                    <div className="relative inline-block group">
                      <img src="https://i.supaimg.com/ad460eb2-b309-4aa9-b61c-59eea64d0f56/84282f7b-0886-40a8-b4cc-752e51042834.png" alt="Logo" className="w-56 mx-auto rounded-[48px] shadow-[0_30px_60px_rgba(0,0,0,0.2)] border-8 border-white opacity-100 transition-all duration-500 transform hover:scale-105" />
                      <div className="absolute -inset-2 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-[52px] blur-2xl opacity-10 group-hover:opacity-30 transition duration-500 -z-10"></div>
                    </div>
                 </div>

                 <div className="space-y-0 animate-up" style={{animationDelay: '0.1s'}}>
                    <div className="rounded-t-[40px] overflow-hidden shadow-xl border-t-4 border-l-4 border-r-4 border-white bg-white"><img src="https://i.supaimg.com/ad460eb2-b309-4aa9-b61c-59eea64d0f56/27456040-3038-48e3-abe7-c71b1e3f381f.jpg" alt="Habit Guide" className="w-full h-auto object-cover" /></div>
                    <div className="bg-white border-b-4 border-l-4 border-r-4 border-white p-7 rounded-b-[40px] shadow-lg relative text-slate-900">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-950 px-4 py-1.5 rounded-full border-2 border-white"><Icons.Quote /></div>
                        <p className="text-[11px] font-black text-slate-600 text-center italic tracking-tight mb-8 mt-3">"saya membuat runititas terinspirasi dari Is it Bad or Good Habits"</p>
                        <div className="space-y-3">
                            <a href="https://vt.tokopedia.com/t/ZS9NfgshTXbJr-zUP68/" target="_blank" className="w-full flex items-center justify-between bg-black text-white p-4 rounded-3xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg active:scale-95 transition-all text-center"><div className="w-10 flex justify-center"><Icons.TikTok /></div><span className="flex-1 text-center">(beli buku)</span><div className="w-10"></div></a>
                            <a href="https://s.shopee.co.id/9zu6l1upsp" target="_blank" className="w-full flex items-center justify-between bg-[#ee4d2d] text-white p-4 rounded-3xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg shadow-orange-100 active:scale-95 transition-all text-center"><div className="w-10 flex justify-center"><Icons.Shop /></div><span className="flex-1 text-center">(beli buku)</span><div className="w-10"></div></a>
                        </div>
                    </div>
                 </div>

                 <div className="bg-white rounded-[40px] p-8 shadow-sm border border-slate-100 animate-up overflow-hidden relative">
                    <div className="absolute -right-4 -top-4 text-indigo-50 opacity-50"><Icons.Brain /></div>
                    <h3 className="text-lg font-black text-slate-800 uppercase italic mb-1.5 leading-none">AI Habit Analyzer</h3>
                    <p className="text-[9px] font-bold text-slate-400 uppercase mb-6 tracking-widest">Analisis kebiasaanmu</p>
                    <div className="space-y-4">
                        <div className="relative">
                            <input value={habitCheckInput} onChange={(e) => setHabitCheckInput(e.target.value)} className="w-full bg-slate-50 p-5 rounded-3xl text-xs font-bold border border-slate-100 focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Ketik kebiasaan..." />
                            <button onClick={checkHabitWithAI} className="absolute right-2 top-2 bottom-2 bg-slate-900 text-white px-5 rounded-2xl text-[10px] font-black uppercase active:scale-95">{isAiLoading ? "..." : "Cek ✨"}</button>
                        </div>
                        {habitResult && (
                            <div className={`p-6 rounded-[28px] animate-page ${habitResult.verdict === 'GOOD' ? 'bg-emerald-50 border-2 border-emerald-100' : 'bg-rose-50 border-2 border-rose-100'}`}>
                                <span className={`px-3 py-1 rounded-full text-[9px] font-black text-white mb-2 inline-block ${habitResult.verdict === 'GOOD' ? 'bg-emerald-500' : 'bg-rose-500'}`}>{habitResult.verdict}</span>
                                <p className={`text-xs font-black italic leading-relaxed ${habitResult.verdict === 'GOOD' ? 'text-emerald-700' : 'text-rose-700'}`}>"{habitResult.reason}"</p>
                            </div>
                        )}
                    </div>
                 </div>
                 
                 <div className="pt-10 flex flex-col items-center">
                    <p className="text-[9px] font-bold text-slate-400 uppercase italic mb-6 tracking-widest opacity-40">gunakan dengan bijak</p>
                    <button onClick={() => { if(confirm("Reset semua data?")) { localStorage.clear(); location.reload(); } }} className="w-12 h-12 flex items-center justify-center rounded-full bg-white border border-slate-200 text-slate-400 active:scale-90 transition-all opacity-30"><Icons.Trash /></button>
                 </div>
              </div>
            )}
          </main>

          <nav className="fixed bottom-4 left-4 right-4 glass-morphism rounded-[32px] p-2 flex justify-between items-center shadow-xl z-60 border border-slate-100">
            {[ { id: 'dashboard', icon: <Icons.Home />, label: 'Home' }, { id: 'agenda', icon: <Icons.Agenda />, label: 'Agenda' }, { id: 'review', icon: <Icons.Review />, label: 'Review' }, { id: 'excel', icon: <Icons.Excel />, label: 'Data' } ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-3.5 rounded-[24px] flex flex-col items-center gap-1 transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white active-tab-shadow scale-105' : 'text-slate-400 hover:bg-slate-50'}`}>
                {tab.icon}
                <span className="text-[7px] font-black uppercase tracking-tighter leading-none mt-1">{tab.label}</span>
              </button>
            ))}
          </nav>

          {isModalOpen && (
            <div className="fixed inset-0 z-[80] bg-slate-900/60 backdrop-blur-md flex items-end justify-center p-0">
              <div className="bg-white w-full max-w-md rounded-t-[40px] p-8 shadow-2xl animate-page max-h-[85vh] overflow-y-auto hide-scrollbar pb-12">
                <div className="flex justify-between items-center mb-8"><h3 className="text-xl font-black italic uppercase">Set Blueprint</h3><button onClick={() => setIsModalOpen(false)} className="text-2xl font-bold opacity-30">✕</button></div>
                <form onSubmit={handleSave} className="space-y-6">
                  <div>
                    <label className="text-[9px] font-black uppercase opacity-40 ml-1">Misi Utama</label>
                    <div className="flex gap-2 mt-1">
                      <input required value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="flex-1 bg-slate-50 p-5 rounded-3xl text-xs font-bold border border-slate-100" placeholder="Apa rencanamu?" />
                      <button type="button" onClick={generateAiSubtasks} className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${formData.title ? 'bg-indigo-600 text-white active:scale-110 shadow-lg' : 'bg-slate-100 text-slate-300'}`}>{isAiLoading ? "..." : <Icons.Magic />}</button>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <input required value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} className="w-full bg-slate-50 p-5 rounded-3xl text-xs font-bold border border-slate-100" placeholder="Jam" />
                    <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full bg-slate-50 p-5 rounded-3xl text-[10px] font-black uppercase border border-slate-100">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                  </div>
                  <div className="space-y-3">
                    <div className="flex justify-between items-center"><label className="text-[9px] font-black uppercase opacity-40 ml-1">Langkah Detail</label><button type="button" onClick={()=>setFormData({...formData, subtasks: [...formData.subtasks, {id: Date.now(), title: ''}]})} className="text-[9px] font-black text-indigo-400 uppercase">+ Tambah</button></div>
                    {formData.subtasks.map(s => (
                      <div key={s.id} className="flex gap-2 animate-up">
                        <input required value={s.title} onChange={e => setFormData({...formData, subtasks: formData.subtasks.map(sub => sub.id === s.id ? {...sub, title: e.target.value} : sub)})} className="flex-1 bg-slate-50 p-4 rounded-2xl text-[10px] font-bold border border-slate-100" />
                        <button type="button" onClick={() => setFormData({...formData, subtasks: formData.subtasks.filter(sub => sub.id !== s.id)})} className="text-rose-500 font-bold px-3">✕</button>
                      </div>
                    ))}
                  </div>
                  <button type="submit" className="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Update Blueprint</button>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
