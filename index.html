<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Runititas Pro - Template Kosong</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase Compat Library -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
    .glass-morphism { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .progress-transition { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-up { animation: slideUp 0.4s ease-out forwards; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    input:focus, select:focus, textarea:focus { outline: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Inisialisasi Firebase ---
    // API Key dikosongkan untuk keamanan saat di-share, Firebase akan menyediakannya saat runtime jika dikonfigurasi
    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":""}');
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'runititas-shared-v4-8';

    // --- DATA AWAL KOSONG ---
    const INITIAL_DATA = [];

    const CATEGORIES = ['Ibadah', 'Kesehatan', 'Konten', 'Santai', 'Belajar', 'Produktivitas', 'Kerja'];
    const COLORS = ['bg-indigo-600', 'bg-emerald-500', 'bg-blue-600', 'bg-teal-500', 'bg-rose-500', 'bg-amber-500', 'bg-violet-500', 'bg-slate-700'];

    function App() {
      const [user, setUser] = useState(null);
      const [habits, setHabits] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingHabit, setEditingHabit] = useState(null);
      const [formData, setFormData] = useState({ title: '', time: '', category: 'Produktivitas', color: 'bg-indigo-600', subtasks: [] });
      
      const [pasteData, setPasteData] = useState('');
      const [copyStatus, setCopyStatus] = useState('Salin Data');
      const [selectedIds, setSelectedIds] = useState([]);

      useEffect(() => {
        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await auth.signInWithCustomToken(__initial_auth_token);
          } else {
            await auth.signInAnonymously();
          }
        };
        initAuth();
        return auth.onAuthStateChanged(setUser);
      }, []);

      useEffect(() => {
        if (!user) return;
        const habitDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('master_plan');
        const unsubscribe = habitDoc.onSnapshot((snapshot) => {
          if (snapshot.exists) {
            setHabits(snapshot.data().habits || []);
          } else {
            setHabits(INITIAL_DATA);
          }
          setIsLoading(false);
        });
        return () => unsubscribe();
      }, [user]);

      const saveToCloud = async (newData) => {
        if (!user) return;
        try {
          const habitDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('master_plan');
          await habitDoc.set({ habits: newData });
        } catch (err) { console.error(err); }
      };

      const toggleSub = (hId, sId) => {
        const newData = habits.map(h => h.id === hId ? {
          ...h, subtasks: h.subtasks.map(s => s.id === sId ? { ...s, isDone: !s.isDone } : s)
        } : h);
        setHabits(newData);
        saveToCloud(newData);
      };

      const handleAddClick = () => {
        setEditingHabit(null);
        setFormData({ title: '', time: '08:00-09:00', category: 'Produktivitas', color: 'bg-indigo-600', subtasks: [{ id: Date.now(), title: '', isDone: false }] });
        setIsModalOpen(true);
      };

      const handleSave = (e) => {
        e.preventDefault();
        const validSubtasks = formData.subtasks.filter(s => s.title.trim() !== '');
        const finalHabit = { ...formData, subtasks: validSubtasks, id: editingHabit ? editingHabit.id : 'h-' + Date.now() };
        const newData = editingHabit ? habits.map(h => h.id === editingHabit.id ? finalHabit : h) : [...habits, finalHabit];
        setHabits(newData);
        saveToCloud(newData);
        setIsModalOpen(false);
      };

      const totalProgress = useMemo(() => {
        if (habits.length === 0) return 0;
        const total = habits.reduce((acc, h) => acc + h.subtasks.length, 0);
        const done = habits.reduce((acc, h) => acc + h.subtasks.filter(s => s.isDone).length, 0);
        return total === 0 ? 0 : Math.round((done / total) * 100);
      }, [habits]);

      if (isLoading) return <div className="h-screen flex items-center justify-center bg-indigo-600 text-white font-black tracking-widest uppercase">Memuat Runititas...</div>;

      return (
        <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-32">
          
          {/* TAB 1: BERANDA */}
          {activeTab === 'dashboard' && (
            <div className="animate-up">
              <header className="p-6">
                <h1 className="text-2xl font-black text-indigo-600 italic tracking-tighter uppercase mb-4 leading-none">RUNITITAS <span className="text-slate-400 not-italic font-medium text-xs">v4.8</span></h1>
                <div className="bg-slate-900 rounded-[40px] p-8 text-white shadow-xl relative overflow-hidden">
                  <p className="text-[10px] font-black uppercase opacity-40 mb-1 tracking-widest">Capaian Hari Ini</p>
                  <h2 className="text-5xl font-black mb-6">{totalProgress}%</h2>
                  <div className="w-full bg-white/10 h-2.5 rounded-full overflow-hidden">
                    <div className="bg-indigo-500 h-full progress-transition" style={{ width: `${totalProgress}%` }}></div>
                  </div>
                </div>
              </header>

              <main className="px-6 space-y-6">
                {habits.length === 0 ? (
                   <div className="py-20 text-center space-y-4">
                      <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto text-indigo-200">
                         <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                      </div>
                      <p className="text-slate-400 text-sm font-bold">Agenda masih kosong, Ngab!<br/>Silakan isi di tab Agenda.</p>
                   </div>
                ) : (
                  habits.map((habit, idx) => (
                    <div key={habit.id} className="bg-white rounded-[32px] p-5 shadow-sm border border-slate-100 animate-up" style={{ animationDelay: `${idx * 0.04}s` }}>
                      <div className="flex items-center gap-4 mb-4">
                        <div className={`w-1.5 h-10 rounded-full ${habit.color}`}></div>
                        <div className="flex-1">
                          <h4 className="font-black text-slate-800 text-sm leading-tight">{habit.title}</h4>
                          <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{habit.time}</p>
                        </div>
                      </div>
                      <div className="space-y-2">
                        {habit.subtasks.map(sub => (
                          <label key={sub.id} className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all ${sub.isDone ? 'bg-slate-50 opacity-40' : 'bg-white border border-slate-50 shadow-sm'}`}>
                            <input type="checkbox" checked={sub.isDone} onChange={() => toggleSub(habit.id, sub.id)} className="w-5 h-5 rounded-lg border-slate-300 text-indigo-600 focus:ring-0" />
                            <span className={`text-xs font-bold ${sub.isDone ? 'line-through text-slate-400' : 'text-slate-600'}`}>{sub.title}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  ))
                )}
              </main>
            </div>
          )}

          {/* TAB 2: AGENDA (MANAJEMEN) */}
          {activeTab === 'agenda' && (
            <div className="animate-up p-6">
              <div className="flex justify-between items-center mb-8">
                <div>
                  <h2 className="text-2xl font-black text-slate-800 italic uppercase leading-none mb-1">Daftar Agenda</h2>
                  <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Buat & Edit Rutinitas</p>
                </div>
                <button onClick={handleAddClick} className="w-12 h-12 bg-indigo-600 rounded-2xl shadow-lg flex items-center justify-center text-white active:scale-90 transition-transform">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
              </div>

              <div className="space-y-4">
                {habits.map(habit => (
                  <div key={habit.id} onClick={() => { setEditingHabit(habit); setFormData({...habit}); setIsModalOpen(true); }} className="bg-white p-5 rounded-[32px] shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-transform">
                    <div className="flex items-center gap-4">
                      <div className={`w-12 h-12 rounded-2xl ${habit.color} flex flex-col items-center justify-center text-white`}>
                        <span className="text-[10px] font-black">{habit.time.split('-')[0]}</span>
                      </div>
                      <div>
                        <h4 className="font-black text-slate-800 text-sm leading-none mb-1">{habit.title}</h4>
                        <p className="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">{habit.category}</p>
                      </div>
                    </div>
                    <svg className="text-slate-200" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* TAB 3: REVIEW */}
          {activeTab === 'review' && (
            <div className="animate-up p-6 flex flex-col items-center pt-20">
               <div className="w-56 h-56 rounded-full bg-white shadow-xl border border-slate-50 flex items-center justify-center relative mb-8">
                  <svg className="absolute inset-0 w-full h-full -rotate-90">
                     <circle cx="112" cy="112" r="95" fill="none" stroke="#f1f5f9" strokeWidth="12" />
                     <circle cx="112" cy="112" r="95" fill="none" stroke="#4f46e5" strokeWidth="12" strokeDasharray="597" strokeDashoffset={597 - (597 * totalProgress / 100)} className="progress-transition" />
                  </svg>
                  <span className="text-7xl font-black text-slate-800 tracking-tighter">{totalProgress}<span className="text-xl">%</span></span>
               </div>
               <h3 className="text-xl font-black text-slate-800 italic uppercase">Skor Produktivitas</h3>
               <p className="text-xs text-slate-400 font-bold mt-2">Tetap fokus dan selesaikan misi harimu!</p>
            </div>
          )}

          {/* TAB 4: EXCEL (BACKUP & RESTORE) */}
          {activeTab === 'excel' && (
            <div className="animate-up p-6 pb-40">
              <h2 className="text-2xl font-black text-slate-800 italic uppercase mb-8">Data Transfer</h2>
              
              <div className="bg-slate-900 rounded-[40px] p-8 text-white shadow-xl mb-8">
                <h3 className="font-black uppercase text-sm mb-4 tracking-widest text-indigo-400">Ekspor Data</h3>
                <button onClick={() => {
                  const text = JSON.stringify(habits);
                  const el = document.createElement('textarea');
                  el.value = text;
                  document.body.appendChild(el);
                  el.select();
                  document.execCommand('copy');
                  document.body.removeChild(el);
                  setCopyStatus('Disalin! ✅');
                  setTimeout(() => setCopyStatus('Salin Data'), 2000);
                }} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl text-xs uppercase mb-4 active:scale-95 transition-all">
                  {copyStatus}
                </button>
                <p className="text-[10px] text-slate-400 font-medium mb-8 leading-relaxed">Gunakan tombol di atas untuk menyalin data kamu, lalu tempelkan di Excel atau aplikasi catatan sebagai backup.</p>
                
                <h3 className="font-black uppercase text-sm mb-4 tracking-widest text-indigo-400">Impor Data</h3>
                <textarea value={pasteData} onChange={e => setPasteData(e.target.value)} placeholder="Tempel kode data di sini..." className="w-full h-24 bg-white/5 border border-white/10 rounded-2xl p-4 text-[10px] font-mono text-white placeholder-slate-600 mb-4 focus:border-indigo-500" />
                <button onClick={() => {
                  try {
                    const parsed = JSON.parse(pasteData);
                    if(Array.isArray(parsed)) { setHabits(parsed); saveToCloud(parsed); setPasteData(''); alert('Berhasil dipulihkan!'); }
                  } catch(e) { alert('Format data salah!'); }
                }} className="w-full bg-white text-slate-900 font-black py-4 rounded-2xl text-xs uppercase active:scale-95 transition-all">Terapkan Data 🔄</button>
              </div>

              <div className="bg-white rounded-[40px] p-8 border-2 border-rose-50 text-center">
                 <p className="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-4 leading-none">Pusat Penghapusan 🗑️</p>
                 <button onClick={() => { if(confirm("Hapus semua agenda?")) { setHabits([]); saveToCloud([]); } }} className="text-[11px] font-black text-slate-400 hover:text-rose-500 uppercase transition-colors">Kosongkan Semua Agenda</button>
              </div>
            </div>
          )}

          {/* MODAL EDIT/ADD */}
          {isModalOpen && (
            <div className="fixed inset-0 z-[70] bg-slate-900/60 backdrop-blur-md flex items-end sm:items-center justify-center p-0 sm:p-4">
              <div className="bg-white w-full max-w-md rounded-t-[48px] sm:rounded-[48px] p-8 shadow-2xl animate-up max-h-[90vh] overflow-y-auto hide-scrollbar">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="text-xl font-black text-slate-800 uppercase italic">{editingHabit ? 'Ubah Agenda' : 'Agenda Baru'}</h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-slate-300 transition-colors hover:text-slate-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                </div>
                <form onSubmit={handleSave} className="space-y-6">
                  <div>
                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Judul Agenda</label>
                    <input required value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full bg-slate-50 p-5 rounded-2xl font-bold text-sm mt-1" placeholder="Misal: Kerja Konten" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Jam</label>
                      <input required value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} className="w-full bg-slate-50 p-5 rounded-2xl font-bold text-sm mt-1" placeholder="08:00-10:00" />
                    </div>
                    <div>
                      <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Kategori</label>
                      <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full bg-slate-50 p-5 rounded-2xl font-bold text-sm mt-1 appearance-none">
                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <div className="flex justify-between items-center mb-2">
                       <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Sub-Tugas</label>
                       <button type="button" onClick={() => setFormData({...formData, subtasks: [...formData.subtasks, {id: Date.now(), title: '', isDone: false}]})} className="text-[10px] font-black text-indigo-600 uppercase">+ Tambah</button>
                    </div>
                    <div className="space-y-3">
                      {formData.subtasks.map(sub => (
                        <div key={sub.id} className="flex gap-2">
                          <input required type="text" value={sub.title} onChange={e => setFormData({...formData, subtasks: formData.subtasks.map(s => s.id === sub.id ? {...s, title: e.target.value} : s)})} className="flex-1 bg-slate-50 border-none rounded-xl p-4 text-xs font-bold" placeholder="Tugas detail..." />
                          <button type="button" onClick={() => setFormData({...formData, subtasks: formData.subtasks.filter(s => s.id !== sub.id)})} className="text-rose-500 px-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-4 pt-4">
                    {editingHabit && (
                      <button type="button" onClick={() => { if(confirm("Hapus agenda ini?")) { const newData = habits.filter(h => h.id !== editingHabit.id); setHabits(newData); saveToCloud(newData); setIsModalOpen(false); } }} className="w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center active:scale-90 transition-transform">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                      </button>
                    )}
                    <button type="submit" className="flex-1 bg-indigo-600 text-white font-black uppercase tracking-widest rounded-2xl h-16 shadow-lg active:scale-95 transition-all">Simpan</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* NAVIGASI BAWAH */}
          <nav className="fixed bottom-6 left-6 right-6 glass-morphism rounded-[32px] p-2 flex justify-between items-center shadow-2xl z-60">
            <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-4 rounded-2xl flex flex-col items-center gap-1 transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400'}`}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
              <span className="text-[7px] font-black uppercase tracking-tighter leading-none mt-1">Beranda</span>
            </button>
            <button onClick={() => setActiveTab('agenda')} className={`flex-1 py-4 rounded-2xl flex flex-col items-center gap-1 transition-all ${activeTab === 'agenda' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400'}`}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              <span className="text-[7px] font-black uppercase tracking-tighter leading-none mt-1">Agenda</span>
            </button>
            <button onClick={() => setActiveTab('review')} className={`flex-1 py-4 rounded-2xl flex flex-col items-center gap-1 transition-all ${activeTab === 'review' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400'}`}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
              <span className="text-[7px] font-black uppercase tracking-tighter leading-none mt-1">Review</span>
            </button>
            <button onClick={() => setActiveTab('excel')} className={`flex-1 py-4 rounded-2xl flex flex-col items-center gap-1 transition-all ${activeTab === 'excel' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400'}`}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
              <span className="text-[7px] font-black uppercase tracking-tighter leading-none mt-1">Excel</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
