<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Runititas Pro - Manual v8.4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; overflow-x: hidden; background-color: #f8fafc; color: #0f172a; }
    .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(0, 0, 0, 0.05); }
    .progress-transition { transition: stroke-dashoffset 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .animate-page { animation: fadeIn 0.4s ease-out forwards; }
    .animate-list-item { opacity: 0; animation: slideInUp 0.4s ease-out forwards; }
    .animate-toast { animation: fadeIn 0.3s ease-out forwards; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    input:focus, select:focus, textarea:focus { outline: none; }
    
    .active-tab-shadow { box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4); }
  </style>
</head>
<body class="font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const STORAGE_KEY_PLAN = "runititas_plan_v8_4";
    const STORAGE_KEY_HISTORY = "runititas_history_v8_4";

    const CATEGORIES = ['Ibadah', 'Kesehatan', 'Konten', 'Santai', 'Belajar', 'Produktivitas', 'Kerja'];
    const COLORS = ['bg-indigo-600', 'bg-emerald-500', 'bg-blue-600', 'bg-teal-500', 'bg-rose-500', 'bg-amber-500', 'bg-violet-500', 'bg-slate-700'];

    const Icons = {
      Home: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Agenda: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Excel: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
      Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      Quote: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" className="text-indigo-400 opacity-50"><path d="M14.017 21L14.017 18C14.017 16.8954 14.9124 16 16.017 16H19.017C19.5693 16 20.017 15.5523 20.017 15V9C20.017 8.44772 19.5693 8 19.017 8H16.017C15.4647 8 15.017 8.44772 15.017 9V12C15.017 12.5523 14.5693 13 14.017 13H12.017V21H14.017ZM5.017 21L5.017 18C5.017 16.8954 5.9124 16 7.017 16H10.017C10.5693 16 11.017 15.5523 11.017 15V9C11.017 8.44772 10.5693 8 10.017 8H7.017C6.46472 8 6.017 8.44772 6.017 9V12C6.017 12.5523 5.5693 13 5.017 13H3.017V21H5.017Z"/></svg>,
      TikTok: () => <svg width="18" height="18" fill="currentColor" viewBox="0 0 448 512"><path d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.17h0A122.18,122.18,0,0,0,381,102.39a121.43,121.43,0,0,0,67,20.14Z"/></svg>,
      Shield: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
      Shop: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    };

    const getFormattedDate = (date) => new Date(date).toISOString().split('T')[0];

    const generateLast7Days = () => {
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push({ full: getFormattedDate(d), dayName: d.toLocaleDateString('id-ID', { weekday: 'short' }), dateNum: d.getDate() });
      }
      return dates.reverse();
    };

    function App() {
      const [habits, setHabits] = useState([]);
      const [history, setHistory] = useState({}); 
      const [selectedDate, setSelectedDate] = useState(getFormattedDate(new Date()));
      const [isLoading, setIsLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingHabit, setEditingHabit] = useState(null);
      const [formData, setFormData] = useState({ title: '', time: '', category: 'Produktivitas', color: 'bg-indigo-600', subtasks: [] });
      const [pasteData, setPasteData] = useState('');
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      const daysList = useMemo(() => generateLast7Days(), []);

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3000);
      };

      useEffect(() => {
        const savedPlan = localStorage.getItem(STORAGE_KEY_PLAN);
        const savedHistory = localStorage.getItem(STORAGE_KEY_HISTORY);
        if (savedPlan) setHabits(JSON.parse(savedPlan));
        if (savedHistory) setHistory(JSON.parse(savedHistory));
        setSelectedDate(getFormattedDate(new Date()));
        setIsLoading(false);
      }, []);

      const savePlan = (newData) => {
        setHabits(newData);
        localStorage.setItem(STORAGE_KEY_PLAN, JSON.stringify(newData));
      };

      const saveHistory = (newHistory) => {
        setHistory(newHistory);
        localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(newHistory));
      };

      const toggleSub = (hId, sId) => {
        const key = `${hId}_${sId}`;
        const newDayHistory = { ...(history[selectedDate] || {}) };
        newDayHistory[key] = !newDayHistory[key];
        const updatedHistory = { ...history, [selectedDate]: newDayHistory };
        saveHistory(updatedHistory);
      };

      const handleRestore = () => {
        try {
          const raw = pasteData.trim();
          if (!raw) return;
          const parsed = JSON.parse(raw);
          
          let newPlan = [];
          let newHistory = {};

          if (Array.isArray(parsed)) {
            newPlan = parsed;
          } else if (parsed.h && Array.isArray(parsed.h)) {
            newPlan = parsed.h;
            newHistory = parsed.s || {};
          } else {
            throw new Error("Invalid Format");
          }

          savePlan(newPlan);
          saveHistory(newHistory);
          setPasteData('');
          showToast('Restore Berhasil! ✅', 'success');
          setActiveTab('dashboard');
        } catch (e) {
          showToast('Data tidak valid! Cek kode kamu.', 'error');
        }
      };

      const handleSave = (e) => {
        e.preventDefault();
        const validSubs = formData.subtasks.filter(s => s.title.trim() !== '');
        const finalHabit = { ...formData, subtasks: validSubs, id: editingHabit ? editingHabit.id : 'h-' + Date.now() };
        const newData = editingHabit ? habits.map(h => h.id === editingHabit.id ? finalHabit : h) : [...habits, finalHabit];
        savePlan(newData);
        setIsModalOpen(false);
        showToast(editingHabit ? 'Terupdate!' : 'Tersimpan!', 'success');
      };

      const dayProgress = useMemo(() => {
        if (habits.length === 0) return 0;
        let total = 0, done = 0;
        habits.forEach(h => h.subtasks.forEach(s => { total++; if (history[selectedDate]?.[`${h.id}_${s.id}`]) done++; }));
        return total === 0 ? 0 : Math.round((done / total) * 100);
      }, [habits, history, selectedDate]);

      if (isLoading) return <div className="h-screen flex items-center justify-center bg-indigo-600 text-white font-black animate-pulse uppercase">RUNITITAS...</div>;

      const ReviewComponent = () => (
        <div className="space-y-6 lg:sticky lg:top-8 animate-page">
            <div className="flex flex-col items-center bg-white rounded-[40px] p-8 shadow-sm border border-slate-100">
                <div className="w-48 h-48 rounded-full bg-white shadow-2xl flex items-center justify-center relative mb-8">
                    <svg className="absolute inset-0 w-full h-full -rotate-90">
                        <circle cx="96" cy="96" r="86" fill="none" stroke="#f1f5f9" strokeWidth="12" />
                        <circle cx="96" cy="96" r="86" fill="none" stroke="#4f46e5" strokeWidth="12" 
                                strokeDasharray="540" 
                                strokeDashoffset={540 - (540 * dayProgress / 100)} 
                                className="progress-transition" 
                                strokeLinecap="round" />
                    </svg>
                    <div className="text-center">
                        <span className="text-5xl font-black text-slate-800 tracking-tighter">{dayProgress}%</span>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Selesai</p>
                    </div>
                </div>
                <div className="w-full bg-indigo-600 rounded-[32px] p-6 text-white text-center relative overflow-hidden shadow-lg">
                    <p className="text-[10px] font-black uppercase text-indigo-200 mb-2 tracking-widest leading-none italic">Status Harian</p>
                    <p className="text-xs font-bold leading-relaxed">
                        {dayProgress === 100 ? "Kemenangan Total! 🔥" : dayProgress > 50 ? "Setengah Jalan Lagi! 🚀" : "Mulai Langkah Kecilmu! ✨"}
                    </p>
                </div>
            </div>
        </div>
      );

      return (
        <div className="min-h-screen">
          <div className="max-w-6xl mx-auto pb-32 lg:pb-16 relative px-4 lg:px-8">
            
            {toast.show && (
              <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-64 animate-toast">
                <div className={`px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border ${toast.type === 'success' ? 'bg-emerald-600 border-emerald-500' : 'bg-indigo-600 border-indigo-500'} text-white`}>
                  <div className="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center font-bold">✓</div>
                  <p className="text-[10px] font-black uppercase tracking-widest">{toast.message}</p>
                </div>
              </div>
            )}

            <header className="pt-8 mb-8 flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none">RUNITITAS <span className="text-slate-400 not-italic font-medium text-xs">v8.4</span></h1>
                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2 italic flex items-center gap-1">
                  <Icons.Shield /> gunakan dengan bijak
                </p>
              </div>
              <div className="w-12 h-12 rounded-[18px] bg-indigo-100 flex items-center justify-center text-indigo-600 font-black text-lg">R</div>
            </header>

            <div className="flex flex-col lg:flex-row gap-8">
                <div className="flex-1 space-y-8">
                    {activeTab === 'dashboard' && (
                        <div className="space-y-8 animate-page">
                            <div className="flex justify-between gap-3 overflow-x-auto hide-scrollbar py-2">
                                {daysList.map(d => (
                                    <button key={d.full} onClick={() => setSelectedDate(d.full)} className={`flex-shrink-0 w-14 py-4 rounded-2xl flex flex-col items-center gap-1 transition-all ${selectedDate === d.full ? 'bg-indigo-600 text-white shadow-xl scale-105' : 'bg-white text-slate-400 border border-slate-100 shadow-sm'}`}>
                                        <span className="text-[9px] font-black uppercase">{d.dayName}</span>
                                        <span className="text-lg font-black">{d.dateNum}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-1 gap-4">
                                {habits.length === 0 ? (
                                    <div className="py-20 text-center text-slate-300 font-bold italic text-sm animate-up">Blueprint masih kosong!</div>
                                ) : (
                                    habits.map((habit, idx) => (
                                        <div key={habit.id} className="bg-white rounded-[40px] p-6 shadow-sm border border-slate-100 animate-list-item" style={{ animationDelay: `${idx * 0.08}s` }}>
                                            <div className="flex items-center gap-4 mb-5">
                                                <div className={`w-1.5 h-10 rounded-full ${habit.color}`}></div>
                                                <div className="flex-1">
                                                    <h4 className="font-black text-slate-800 text-base leading-tight">{habit.title}</h4>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{habit.time} • {habit.category}</p>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                {habit.subtasks.map(sub => {
                                                    const isDone = history[selectedDate]?.[`${habit.id}_${sub.id}`];
                                                    return (
                                                        <label key={sub.id} className={`flex items-center gap-4 p-5 rounded-3xl transition-all cursor-pointer group active:scale-95 ${isDone ? 'bg-slate-50 opacity-40' : 'bg-white border border-slate-100 shadow-sm'}`}>
                                                            <input type="checkbox" checked={!!isDone} onChange={() => toggleSub(habit.id, sub.id)} className="w-6 h-6 rounded-lg border-slate-300 text-indigo-600 focus:ring-0 transition-transform group-active:scale-125" />
                                                            <span className={`text-[13px] font-bold ${isDone ? 'line-through text-slate-400' : 'text-slate-700'}`}>{sub.title}</span>
                                                        </label>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'agenda' && (
                        <div className="space-y-4 animate-page">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black italic uppercase text-indigo-600 tracking-widest">Manajemen Misi</h2>
                                <button onClick={() => { setEditingHabit(null); setFormData({title:'',time:'08:00',category:'Konten',color:'bg-indigo-600',subtasks:[]}); setIsModalOpen(true); }} className="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-transform"><Icons.Plus /></button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {habits.map((h, idx) => (
                                    <div key={h.id} onClick={() => {setEditingHabit(h); setFormData({...h}); setIsModalOpen(true);}} className="bg-white p-5 rounded-[32px] border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-all animate-list-item shadow-sm">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-12 h-12 rounded-2xl ${h.color} flex items-center justify-center text-white font-black text-xs`}>{h.time}</div>
                                            <h4 className="font-black text-slate-800 text-sm leading-none">{h.title}</h4>
                                        </div>
                                        <div className="text-slate-200"><Icons.Agenda /></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'excel' && (
                        <div className="space-y-12 animate-page pb-20 text-center">
                            <div className="bg-slate-900 p-8 rounded-[40px] text-white shadow-2xl relative overflow-hidden">
                                <h3 className="font-black italic mb-6 uppercase text-[12px] text-indigo-400 tracking-widest">Backup & Transfer</h3>
                                <div className="space-y-4">
                                    <button onClick={() => { navigator.clipboard.writeText(JSON.stringify({h: habits, s: history})); showToast('Kode Tersalin! ✅'); }} className="w-full bg-white text-slate-900 py-4 rounded-2xl font-black uppercase text-[11px] active:scale-95">Salin Database</button>
                                    <textarea value={pasteData} onChange={e=>setPasteData(e.target.value)} className="w-full h-24 bg-white/5 p-4 text-[10px] font-mono text-white rounded-3xl mb-4 border border-white/10" placeholder="Tempel kode di sini..."></textarea>
                                    <button onClick={handleRestore} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-[11px] active:scale-95 shadow-lg">Restore Data 🔄</button>
                                </div>
                            </div>

                            <div className="space-y-12">
                                <img src="https://i.supaimg.com/ad460eb2-b309-4aa9-b61c-59eea64d0f56/84282f7b-0886-40a8-b4cc-752e51042834.png" alt="Logo" className="w-64 mx-auto rounded-[56px] shadow-2xl border-8 border-white" />
                                <div className="w-full max-w-sm mx-auto shadow-2xl rounded-[50px] overflow-hidden border-8 border-white bg-white">
                                    <img src="https://i.supaimg.com/ad460eb2-b309-4aa9-b61c-59eea64d0f56/27456040-3038-48e3-abe7-c71b1e3f381f.jpg" alt="Guide" className="w-full h-auto" />
                                    <div className="p-8 space-y-6">
                                        <div className="bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-black italic inline-block">"saya membuat runititas terinspirasi dari Is it Bad or Good Habits"</div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <a href="https://vt.tokopedia.com/t/ZS9NfgshTXbJr-zUP68/" target="_blank" className="flex items-center justify-center gap-2 bg-black text-white py-4 rounded-3xl font-black text-[9px] uppercase active:scale-95 shadow-lg"><Icons.TikTok />TikTok Shop</a>
                                            <a href="https://s.shopee.co.id/9zu6l1upsp" target="_blank" className="flex items-center justify-center gap-2 bg-[#ee4d2d] text-white py-4 rounded-3xl font-black text-[9px] uppercase active:scale-95 shadow-lg"><Icons.Shop />Shopee Shop</a>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => { if(confirm("Hapus Permanen?")) { localStorage.clear(); location.reload(); } }} className="w-12 h-12 flex items-center justify-center rounded-full bg-slate-100 text-slate-400 active:scale-90 transition-all mx-auto opacity-20"><Icons.Trash /></button>
                            </div>
                        </div>
                    )}
                </div>

                <div className="w-full lg:w-[380px] shrink-0">
                    <ReviewComponent />
                </div>
            </div>
          </div>

          <nav className="fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] max-w-md glass-morphism rounded-[32px] p-2 flex justify-between items-center shadow-2xl z-60 border border-slate-100">
            {[ 
                { id: 'dashboard', icon: <Icons.Home />, label: 'Home' }, 
                { id: 'agenda', icon: <Icons.Agenda />, label: 'Agenda' }, 
                { id: 'excel', icon: <Icons.Excel />, label: 'Data' } 
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-4 rounded-[24px] flex flex-col items-center gap-1 transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white active-tab-shadow scale-105' : 'text-slate-400 hover:bg-slate-50'}`}>
                {tab.icon}
                <span className="text-[8px] font-black uppercase tracking-widest mt-1 leading-none">{tab.label}</span>
              </button>
            ))}
          </nav>

          {isModalOpen && (
            <div className="fixed inset-0 z-[80] bg-slate-900/60 backdrop-blur-md flex items-end justify-center p-0">
              <div className="bg-white w-full max-w-md rounded-t-[48px] p-10 shadow-2xl animate-page max-h-[85vh] overflow-y-auto hide-scrollbar pb-20">
                <div className="flex justify-between items-center mb-8">
                    <h3 className="text-2xl font-black italic uppercase text-slate-800">Edit Misi</h3>
                    <button onClick={() => setIsModalOpen(false)} className="text-3xl font-bold text-slate-300">✕</button>
                </div>
                <form onSubmit={handleSave} className="space-y-8">
                  <div>
                    <label className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-[0.2em]">Judul Misi</label>
                    <input required value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full bg-slate-50 p-5 mt-2 rounded-3xl text-sm font-bold border border-slate-100 focus:bg-white transition-all" placeholder="Misal: Edit Video" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <input required value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} className="bg-slate-50 p-5 rounded-3xl text-sm font-bold border border-slate-100" placeholder="Jam" />
                    <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="bg-slate-50 p-5 rounded-3xl text-[11px] font-black uppercase border border-slate-100">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                  </div>
                  <div className="space-y-4">
                    <div className="flex justify-between items-center"><label className="text-[10px] font-black uppercase text-slate-400 ml-1">Langkah Detail</label><button type="button" onClick={()=>setFormData({...formData, subtasks: [...formData.subtasks, {id: Date.now(), title: ''}]})} className="text-[10px] font-black text-indigo-600 uppercase">+ Tambah</button></div>
                    {formData.subtasks.map(s => (
                      <div key={s.id} className="flex gap-2 animate-up">
                        <input required value={s.title} onChange={e => setFormData({...formData, subtasks: formData.subtasks.map(sub => sub.id === s.id ? {...sub, title: e.target.value} : sub)})} className="flex-1 bg-slate-50 p-4 rounded-2xl text-[12px] font-bold border border-slate-100" />
                        <button type="button" onClick={() => setFormData({...formData, subtasks: formData.subtasks.filter(sub => sub.id !== s.id)})} className="text-rose-500 font-bold px-4">✕</button>
                      </div>
                    ))}
                  </div>
                  <button type="submit" className="w-full bg-indigo-600 text-white py-5 rounded-[28px] font-black uppercase text-xs shadow-xl active:scale-95 transition-all tracking-[0.2em]">Update Blueprint</button>
                  {editingHabit && <button type="button" onClick={() => {if(confirm('Hapus?')){savePlan(habits.filter(h=>h.id!==editingHabit.id)); setIsModalOpen(false);}}} className="w-full text-[10px] font-black text-rose-500/50 uppercase">Hapus Misi Ini</button>}
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
