<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Runititas Pro - Master Plan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Library Firebase Compat (Stabil untuk Single File) -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
    .glass-morphism { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .progress-transition { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-up { animation: slideUp 0.4s ease-out forwards; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    input:focus, select:focus, textarea:focus { outline: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ==========================================================
    // ⚠️ PENGATURAN FIREBASE (MASUKKAN KONFIGURASI KAMU DI SINI) ⚠️
    // ==========================================================
    const myFirebaseConfig = {
      apiKey: "PASTE_API_KEY_KAMU",
      authDomain: "PROJECT_ID.firebaseapp.com",
      projectId: "PROJECT_ID",
      storageBucket: "PROJECT_ID.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };
    // ==========================================================

    // Inisialisasi Firebase Secara Aman
    let auth, db;
    try {
      if (!firebase.apps.length && myFirebaseConfig.apiKey !== "PASTE_API_KEY_KAMU") {
        firebase.initializeApp(myFirebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      }
    } catch (e) { console.error("Firebase Init Error:", e); }

    const appId = "runititas-pro-v5";
    const CATEGORIES = ['Ibadah', 'Kesehatan', 'Konten', 'Santai', 'Belajar', 'Produktivitas', 'Kerja'];
    const COLORS = ['bg-indigo-600', 'bg-emerald-500', 'bg-blue-600', 'bg-teal-500', 'bg-rose-500', 'bg-amber-500', 'bg-violet-500', 'bg-slate-700'];

    // --- ICONS (Inline SVG) ---
    const Icons = {
      Home: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Agenda: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Review: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,
      Excel: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
      Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    };

    function App() {
      const [user, setUser] = useState(null);
      const [habits, setHabits] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingHabit, setEditingHabit] = useState(null);
      const [formData, setFormData] = useState({ title: '', time: '', category: 'Produktivitas', color: 'bg-indigo-600', subtasks: [] });
      const [pasteData, setPasteData] = useState('');
      const [copyStatus, setCopyStatus] = useState('Salin Data');

      // --- Autentikasi ---
      useEffect(() => {
        if (!auth) { 
          setUser({ uid: "demo-user" }); 
          setIsLoading(false);
          return; 
        }
        const unsub = auth.onAuthStateChanged(u => {
          if (u) { setUser(u); } 
          else { auth.signInAnonymously(); }
        });
        return unsub;
      }, []);

      // --- Firestore Sinkronisasi ---
      useEffect(() => {
        if (!user || !db) return;
        const habitDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('master_plan');
        const unsubscribe = habitDoc.onSnapshot((snapshot) => {
          if (snapshot.exists) {
            setHabits(snapshot.data().habits || []);
          } else {
            setHabits([]); // Mulai kosong untuk teman-teman
          }
          setIsLoading(false);
        }, (err) => {
          console.error("Firestore Error:", err);
          setIsLoading(false);
        });
        return () => unsubscribe();
      }, [user]);

      const saveToCloud = async (newData) => {
        if (!user || !db) return;
        try {
          const habitDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('master_plan');
          await habitDoc.set({ habits: newData });
        } catch (err) { console.error("Save Error:", err); }
      };

      // --- Handlers ---
      const toggleSub = (hId, sId) => {
        const newData = habits.map(h => h.id === hId ? {
          ...h, subtasks: h.subtasks.map(s => s.id === sId ? { ...s, isDone: !s.isDone } : s)
        } : h);
        setHabits(newData);
        saveToCloud(newData);
      };

      const handleSave = (e) => {
        e.preventDefault();
        const validSubtasks = formData.subtasks.filter(s => s.title.trim() !== '');
        const finalHabit = { ...formData, subtasks: validSubtasks, id: editingHabit ? editingHabit.id : 'h-' + Date.now() };
        const newData = editingHabit ? habits.map(h => h.id === editingHabit.id ? finalHabit : h) : [...habits, finalHabit];
        setHabits(newData);
        saveToCloud(newData);
        setIsModalOpen(false);
      };

      const totalProgress = useMemo(() => {
        if (habits.length === 0) return 0;
        const total = habits.reduce((acc, h) => acc + h.subtasks.length, 0);
        const done = habits.reduce((acc, h) => acc + h.subtasks.filter(s => s.isDone).length, 0);
        return total === 0 ? 0 : Math.round((done / total) * 100);
      }, [habits]);

      if (isLoading) return (
        <div className="h-screen flex items-center justify-center bg-indigo-600 text-white font-black tracking-widest text-sm uppercase animate-pulse">
          Menyiapkan Runititas...
        </div>
      );

      return (
        <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-32">
          
          {/* HEADER SECTION */}
          <header className="p-6">
            <div className="flex justify-between items-center mb-6">
              <h1 className="text-2xl font-black text-indigo-600 italic tracking-tighter uppercase leading-none">RUNITITAS <span className="text-slate-400 not-italic font-medium text-xs">v5.0</span></h1>
              <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-black text-[10px] uppercase">{user?.uid.slice(0,1)}</div>
            </div>
            
            <div className="bg-slate-900 rounded-[40px] p-8 text-white shadow-xl relative overflow-hidden">
               <div className="relative z-10">
                <p className="text-[10px] font-black uppercase opacity-40 mb-1 tracking-widest leading-none">Progres Hari Ini</p>
                <h2 className="text-5xl font-black mb-6">{totalProgress}%</h2>
                <div className="w-full bg-white/10 h-2.5 rounded-full overflow-hidden">
                  <div className="bg-indigo-500 h-full progress-transition" style={{ width: `${totalProgress}%` }}></div>
                </div>
              </div>
              <div className="absolute -right-8 -bottom-8 w-32 h-32 bg-indigo-600/20 rounded-full blur-3xl"></div>
            </div>
          </header>

          {/* MAIN CONTENT (TAB SWITCH) */}
          <main className="px-6">
            
            {/* 1. BERANDA: CHECKLIST */}
            {activeTab === 'dashboard' && (
              <div className="animate-up space-y-6">
                <div className="flex justify-between items-center px-1">
                   <h3 className="font-black text-slate-800 uppercase text-[10px] tracking-widest opacity-50">Timeline Aktivitas</h3>
                </div>
                {habits.length === 0 ? (
                   <div className="py-20 text-center text-slate-300 font-bold italic text-sm">Belum ada agenda.<br/>Silakan buat di tab Agenda.</div>
                ) : (
                  habits.map((habit, idx) => (
                    <div key={habit.id} className="bg-white rounded-[32px] p-5 shadow-sm border border-slate-100 animate-up" style={{ animationDelay: `${idx * 0.04}s` }}>
                      <div className="flex items-center gap-4 mb-4">
                        <div className={`w-1.5 h-10 rounded-full ${habit.color}`}></div>
                        <div className="flex-1">
                          <h4 className="font-black text-slate-800 text-sm leading-tight">{habit.title}</h4>
                          <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{habit.time}</p>
                        </div>
                      </div>
                      <div className="space-y-2">
                        {habit.subtasks.map(sub => (
                          <label key={sub.id} className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all ${sub.isDone ? 'bg-slate-50 opacity-40' : 'bg-white border border-slate-50 shadow-sm'}`}>
                            <input type="checkbox" checked={sub.isDone} onChange={() => toggleSub(habit.id, sub.id)} className="w-5 h-5 rounded-lg border-slate-300 text-indigo-600 focus:ring-0" />
                            <span className={`text-xs font-bold ${sub.isDone ? 'line-through text-slate-400' : 'text-slate-600'}`}>{sub.title}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {/* 2. AGENDA: EDIT LIST */}
            {activeTab === 'agenda' && (
              <div className="animate-up space-y-4">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-xl font-black italic uppercase leading-none">Manajemen Agenda</h2>
                  <button onClick={() => { setEditingHabit(null); setFormData({title:'',time:'08:00-09:00',category:'Produktivitas',color:'bg-indigo-600',subtasks:[]}); setIsModalOpen(true); }} className="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                    <Icons.Plus />
                  </button>
                </div>
                {habits.map(h => (
                  <div key={h.id} onClick={() => {setEditingHabit(h); setFormData({...h}); setIsModalOpen(true);}} className="bg-white p-5 rounded-[32px] shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-transform">
                    <div className="flex items-center gap-4">
                      <div className={`w-12 h-12 rounded-2xl ${h.color} flex items-center justify-center text-white font-black text-[10px]`}>{h.time.split('-')[0]}</div>
                      <div>
                        <h4 className="font-black text-slate-800 text-sm leading-none mb-1">{h.title}</h4>
                        <p className="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">{h.category}</p>
                      </div>
                    </div>
                    <svg className="text-slate-200" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </div>
                ))}
              </div>
            )}

            {/* 3. REVIEW: STATS */}
            {activeTab === 'review' && (
              <div className="animate-up flex flex-col items-center pt-10">
                 <div className="w-52 h-52 rounded-full bg-white shadow-2xl flex items-center justify-center relative mb-8">
                    <svg className="absolute inset-0 w-full h-full -rotate-90">
                       <circle cx="104" cy="104" r="92" fill="none" stroke="#f1f5f9" strokeWidth="12" />
                       <circle cx="104" cy="104" r="92" fill="none" stroke="#4f46e5" strokeWidth="12" strokeDasharray="578" strokeDashoffset={578 - (578 * totalProgress / 100)} className="progress-transition" />
                    </svg>
                    <span className="text-6xl font-black text-slate-800 tracking-tighter">{totalProgress}<span className="text-xl">%</span></span>
                 </div>
                 <h3 className="text-xl font-black text-slate-800 italic uppercase">Skor Produktivitas</h3>
                 <p className="text-xs text-slate-400 font-bold mt-2">Tetap fokus dan selesaikan misi harimu, Ngab!</p>
              </div>
            )}

            {/* 4. EXCEL: BACKUP & DANGER ZONE */}
            {activeTab === 'excel' && (
              <div className="animate-up space-y-6 pb-20">
                 <div className="bg-indigo-600 p-8 rounded-[40px] text-white shadow-xl">
                    <h3 className="font-black italic mb-2 uppercase text-indigo-200">Simpan Data (Excel)</h3>
                    <button onClick={() => {
                      const dataStr = JSON.stringify(habits);
                      const el = document.createElement('textarea');
                      el.value = dataStr;
                      document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                      setCopyStatus('Disalin! ✅');
                      setTimeout(() => setCopyStatus('Salin Data'), 2000);
                    }} className="w-full bg-white text-indigo-600 py-4 rounded-2xl font-black uppercase text-xs mb-4 active:scale-95 transition-all shadow-lg">{copyStatus}</button>
                    <p className="text-[10px] opacity-70 mb-8 leading-relaxed">Salin teks di atas dan tempel di Excel/Sheets sebagai cadangan permanen kamu.</p>
                    
                    <h3 className="font-black italic mb-2 uppercase text-indigo-200">Kembalikan Data</h3>
                    <textarea value={pasteData} onChange={e=>setPasteData(e.target.value)} className="w-full h-24 bg-indigo-700/50 border border-white/10 p-4 text-[10px] font-mono text-white placeholder-indigo-300 rounded-2xl mb-4" placeholder="Tempel kode data kamu di sini..."></textarea>
                    <button onClick={() => {
                      try {
                        const parsed = JSON.parse(pasteData);
                        if(Array.isArray(parsed)) { setHabits(parsed); saveToCloud(parsed); setPasteData(''); alert('Data berhasil dipulihkan!'); }
                      } catch(e) { alert('Format data salah!'); }
                    }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Terapkan Data 🔄</button>
                 </div>

                 <div className="bg-white p-8 rounded-[40px] border-2 border-rose-50 text-center">
                    <p className="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-4">Zona Bahaya ⚠️</p>
                    <button onClick={() => { if(confirm("Hapus semua agenda permanen?")) { setHabits([]); saveToCloud([]); } }} className="w-full text-xs font-black text-slate-400 hover:text-rose-500 uppercase py-2 transition-colors">Kosongkan Semua Agenda</button>
                 </div>
              </div>
            )}
          </main>

          {/* MODAL EDIT/ADD */}
          {isModalOpen && (
            <div className="fixed inset-0 z-[70] bg-slate-900/60 backdrop-blur-md flex items-end sm:items-center justify-center p-0 sm:p-4">
              <div className="bg-white w-full max-w-md rounded-t-[48px] sm:rounded-[48px] p-8 shadow-2xl animate-up max-h-[90vh] overflow-y-auto hide-scrollbar">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="text-xl font-black text-slate-800 uppercase italic leading-none">{editingHabit ? 'Ubah Agenda' : 'Agenda Baru'}</h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-slate-300 hover:text-slate-500 transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                </div>
                <form onSubmit={handleSave} className="space-y-6">
                  <div>
                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Judul Agenda</label>
                    <input required value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full bg-slate-50 p-5 rounded-2xl font-bold text-sm mt-1" placeholder="Contoh: Fokus Kreatif" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Jam</label>
                      <input required value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} className="w-full bg-slate-50 p-5 rounded-2xl font-bold text-sm mt-1" placeholder="05:00-06:00" />
                    </div>
                    <div>
                      <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Kategori</label>
                      <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full bg-slate-50 p-5 rounded-2xl font-bold text-sm mt-1 appearance-none">
                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Warna</label>
                    <div className="flex gap-3 mt-2 overflow-x-auto hide-scrollbar pb-2">
                      {COLORS.map(c => (
                        <div key={c} onClick={() => setFormData({...formData, color: c})} className={`w-8 h-8 rounded-full cursor-pointer flex-shrink-0 transition-transform ${c} ${formData.color === c ? 'ring-4 ring-slate-200 scale-110' : ''}`}></div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div className="flex justify-between items-center mb-2">
                       <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1 leading-none">Sub-Tugas</label>
                       <button type="button" onClick={() => setFormData({...formData, subtasks: [...formData.subtasks, {id: Date.now(), title: '', isDone: false}]})} className="text-[10px] font-black text-indigo-600 uppercase tracking-widest">+ Tambah</button>
                    </div>
                    <div className="space-y-3">
                      {formData.subtasks.map(sub => (
                        <div key={sub.id} className="flex gap-2">
                          <input required type="text" value={sub.title} onChange={e => setFormData({...formData, subtasks: formData.subtasks.map(s => s.id === sub.id ? {...s, title: e.target.value} : s)})} className="flex-1 bg-slate-50 border-none rounded-xl p-4 text-xs font-bold" placeholder="Tugas detail..." />
                          <button type="button" onClick={() => setFormData({...formData, subtasks: formData.subtasks.filter(s => s.id !== sub.id)})} className="text-rose-500 px-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-4 pt-4">
                    {editingHabit && (
                      <button type="button" onClick={() => { if(confirm("Hapus agenda ini?")) { const newData = habits.filter(h => h.id !== editingHabit.id); setHabits(newData); saveToCloud(newData); setIsModalOpen(false); } }} className="w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center active:scale-90 transition-transform">
                        <Icons.Trash />
                      </button>
                    )}
                    <button type="submit" className="flex-1 bg-indigo-600 text-white font-black uppercase tracking-widest rounded-2xl h-16 shadow-lg shadow-indigo-100 active:scale-95 transition-all">Simpan Jadwal</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* NAVIGATION BAR (4 TABS) */}
          <nav className="fixed bottom-6 left-6 right-6 glass-morphism rounded-[32px] p-2 flex justify-between items-center shadow-2xl z-60">
            {[ 
              { id: 'dashboard', icon: <Icons.Home />, label: 'Beranda' },
              { id: 'agenda', icon: <Icons.Agenda />, label: 'Agenda' },
              { id: 'review', icon: <Icons.Review />, label: 'Review' },
              { id: 'excel', icon: <Icons.Excel />, label: 'Excel' }
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-4 rounded-2xl flex flex-col items-center gap-1 transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400'}`}>
                {tab.icon}
                <span className="text-[7.5px] font-black uppercase tracking-tighter leading-none mt-1">{tab.label}</span>
              </button>
            ))}
          </nav>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
